name: Build & Release CV

on:
  push:
    branches: [ "master" ]
  workflow_dispatch: # manual

permissions:
  contents: write

jobs:
  build-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-extra

      - name: Generate CV PDF
        run: |
          mkdir -p dist
          pandoc cv.md -o dist/cv.pdf --pdf-engine=xelatex --template=templates/modern.tex
          echo "✅ CV PDF success."

      - name: Upload CV artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: dist/cv.pdf

  release-cv:
    needs: build-cv
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CV artifact
        uses: actions/download-artifact@v4
        with:
          name: cv-pdf
          path: dist

      - name: Create tag version
        id: tagger
        run: |
          VERSION=v$(date +'%Y.%m.%d-%H%M%S')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagger.outputs.version }}
          name: "CV Release ${{ steps.tagger.outputs.version }}"
          body: |
            🚀 CV updated.
            Fecha: $(date +'%Y-%m-%d')
          files: dist/cv.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
